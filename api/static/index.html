<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Video Gateway</title>
  <link rel="stylesheet" href="/ui/styles.css" />
</head>

<body>
  <div class="shell">
    <header>
      <div>
        <p class="eyebrow">Real-Time Edge AI</p>
        <h1>Video Analytics Gateway</h1>
      </div>
      <button id="refresh" class="ghost">Refresh</button>
    </header>

    <section class="card">
      <h2>Start Pipeline</h2>
      <form id="start-form">
        <label>Camera / RTSP URL<input type="text" id="source" placeholder="rtsp://user:pass@camera/stream"
            required /></label>
        <label>Model Path<input type="text" id="model" placeholder="models/yolov8.onnx" /></label>
        <button type="submit">Launch</button>
      </form>
    </section>

    <section class="card">
      <h2>Active Pipelines</h2>
      <table id="pipelines-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Source</th>
            <th>Frames</th>
            <th>Detections</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section class="card">
      <h2>Rules</h2>
      <form id="rule-form" class="inline">
        <input id="rule-name" placeholder="Rule name" required />
        <input id="rule-label" placeholder="Label e.g. person" required />
        <input id="rule-count" type="number" min="1" value="1" />
        <input id="rule-score" type="number" step="0.1" min="0" max="1" value="0.5" />
        <input id="rule-webhook" placeholder="Webhook URL" required />
        <button type="submit">Add Rule</button>
      </form>
      <ul id="rules-list"></ul>
    </section>
  </div>
  <script src="/ui/app.js"></script>
</body>

</html>
